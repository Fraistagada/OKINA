<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OKINA – Inscription</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <script>
      // Applique le thème sauvegardé avant le rendu (évite le flash)
      (function () {
        const saved = localStorage.getItem("okina-theme");
        if (
          saved === "dark" ||
          (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <!-- Inscription centrée -->
    <div class="auth-center">
      <div class="auth-card">
        <div class="auth-card-brand">
          <div class="mark">
            <svg
              viewBox="0 0 24 24"
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
          </div>
          <span>OKINA Kanban</span>
        </div>

        <form class="auth-form" method="post" th:action="@{/register}">
          <h2 class="form-title">Créer un compte</h2>
          <p class="form-sub">Rejoignez votre équipe sur OKINA Kanban.</p>

          <div class="field">
            <label for="pseudo">Pseudo</label>
            <input
              type="text"
              id="pseudo"
              name="pseudo"
              th:value="${pseudo}"
              autofocus
            />
            <span class="hint">Sera unique sur la plateforme.</span>
            <!-- Erreur pseudo spécifique -->
            <span
              class="err"
              th:if="${erreur != null and #strings.contains(erreur, 'pseudo')}"
              th:text="${erreur}"
            ></span>
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" th:value="${email}" />
            <span
              class="err"
              th:if="${erreur != null and #strings.contains(erreur, 'mail')}"
              th:text="${erreur}"
            ></span>
          </div>

          <div class="field">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" />
            <span class="hint">Minimum 8 caractères.</span>
            <span
              class="err"
              th:if="${erreur != null and #strings.contains(erreur, 'passe')}"
              th:text="${erreur}"
            ></span>
          </div>

          <!-- Erreur générique (serveur, doublon, etc.) -->
          <div
            class="field"
            th:if="${erreur != null
                and !#strings.contains(erreur, 'pseudo')
                and !#strings.contains(erreur, 'mail')
                and !#strings.contains(erreur, 'passe')}"
          >
            <span class="err" th:text="${erreur}"></span>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-block"
            style="margin-top: 8px"
          >
            Créer le compte
          </button>

          <p class="switch">
            Déjà inscrit·e ? <a th:href="@{/login}">Se connecter</a>
          </p>
        </form>
      </div>
    </div>
    <!-- Bascule thème clair / sombre -->
    <button
      class="theme-toggle"
      id="themeToggle"
      title="Changer de thème"
      aria-label="Changer de thème"
    >
      <svg
        class="moon"
        viewBox="0 0 24 24"
        width="18"
        height="18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
      <svg
        class="sun"
        viewBox="0 0 24 24"
        width="18"
        height="18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
    </button>
    <script>
      document.getElementById("themeToggle").onclick = function () {
        const root = document.documentElement;
        if (root.getAttribute("data-theme") === "dark") {
          root.removeAttribute("data-theme");
          localStorage.setItem("okina-theme", "light");
        } else {
          root.setAttribute("data-theme", "dark");
          localStorage.setItem("okina-theme", "dark");
        }
      };
    </script>
  </body>
</html>
