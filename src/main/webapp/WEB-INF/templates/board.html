<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${board.name} + ' – OKINA'">Tableau – OKINA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <script>
    // Colorise les barres de type après chargement
    const colors = {
      bug: "#e0394a",
      spike: "#b45ee0",
      amelioration: "#1f9c70",
      standard: "#6b7280",
    };
    document.querySelectorAll(".task-type-bar").forEach((el) => {
      el.style.background = colors[el.dataset.type] || "#6b7280";
    });
  </script>
  <body>
    <div class="app-shell">
      <!-- Header -->
      <header class="app-header">
        <div class="brand">
          <div class="mark">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
          </div>
          <span>OKINA Kanban</span>
        </div>

        <a
          th:href="@{/boards}"
          class="btn btn-ghost btn-sm text-decoration-none"
          >← Mes tableaux</a
        >

        <div class="spacer"></div>

        <!-- Membres -->
        <div class="member-list" style="gap: 4px; align-items: center">
          <div
            th:each="m : ${members}"
            class="avatar sm"
            style="background: var(--accent)"
            th:text="${#strings.substring(m.pseudo,0,1).toUpperCase()}"
            th:title="${m.pseudo}"
          >
            A
          </div>
        </div>

        <!-- Inviter -->
        <button class="btn btn-ghost btn-sm" id="btnInvite">+ Inviter</button>

        <!-- Ajouter tâche -->
        <button class="btn btn-primary btn-sm" id="btnAddTask">+ Tâche</button>

        <a
          th:href="@{/logout}"
          class="btn btn-ghost btn-sm text-decoration-none"
          >Se déconnecter</a
        >
      </header>

      <!-- Titre du tableau -->
      <div class="board-titlebar">
        <h2 th:text="${board.name}">Mon tableau</h2>
      </div>

      <!-- Colonnes Kanban -->
      <div class="board-columns" id="boardColumns">
        <!-- Colonne À faire -->
        <div
          class="kanban-col"
          id="col-todo"
          data-col="todo"
          ondragover="event.preventDefault()"
          ondrop="onDrop(event, 'todo')"
        >
          <div class="col-header">
            <span class="col-dot" style="background: #94a3b8"></span>
            <span>À faire</span>
            <span class="col-count" th:text="${countTodo}">0</span>
          </div>
          <div class="cards-list" id="list-todo">
            <div th:each="task : ${tasks}" th:if="${task.columnId == 'todo'}">
              <div
                class="task-card"
                draggable="true"
                th:data-id="${task.id}"
                th:data-board="${board.id}"
                ondragstart="onDragStart(event)"
                onclick="openTask(this.dataset.id)"
              >
                <div class="task-type-bar" th:data-type="${task.typeId}"></div>
                <div class="task-body">
                  <p class="task-title" th:text="${task.title}">Titre</p>
                  <span class="task-type-badge" th:text="${task.typeId}"
                    >standard</span
                  >
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Colonne En cours -->
        <div
          class="kanban-col"
          id="col-doing"
          data-col="doing"
          ondragover="event.preventDefault()"
          ondrop="onDrop(event, 'doing')"
        >
          <div class="col-header">
            <span class="col-dot" style="background: #3b6ef5"></span>
            <span>En cours</span>
            <span class="col-count" th:text="${countDoing}">0</span>
          </div>
          <div class="cards-list" id="list-doing">
            <div th:each="task : ${tasks}" th:if="${task.columnId == 'doing'}">
              <div
                class="task-card"
                draggable="true"
                th:data-id="${task.id}"
                th:data-board="${board.id}"
                ondragstart="onDragStart(event)"
                onclick="openTask(this.dataset.id)"
              >
                <div class="task-type-bar" th:data-type="${task.typeId}"></div>
                <div class="task-body">
                  <p class="task-title" th:text="${task.title}">Titre</p>
                  <span class="task-type-badge" th:text="${task.typeId}"
                    >standard</span
                  >
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Colonne Terminé -->
        <div
          class="kanban-col"
          id="col-done"
          data-col="done"
          ondragover="event.preventDefault()"
          ondrop="onDrop(event, 'done')"
        >
          <div class="col-header">
            <span class="col-dot" style="background: #1f9c70"></span>
            <span>Terminé</span>
            <span class="col-count" th:text="${countDone}">0</span>
          </div>
          <div class="cards-list" id="list-done">
            <div th:each="task : ${tasks}" th:if="${task.columnId == 'done'}">
              <div
                class="task-card"
                draggable="true"
                th:data-id="${task.id}"
                th:data-board="${board.id}"
                ondragstart="onDragStart(event)"
                onclick="openTask(this.dataset.id)"
              >
                <div class="task-type-bar" th:data-type="${task.typeId}"></div>
                <div class="task-body">
                  <p class="task-title" th:text="${task.title}">Titre</p>
                  <span class="task-type-badge" th:text="${task.typeId}"
                    >standard</span
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- =====================================================
     MODAL : Créer une tâche
===================================================== -->
    <div class="modal-backdrop" id="modalAddTask" style="display: none">
      <div class="modal">
        <header>
          <h3>Nouvelle tâche</h3>
          <button
            class="icon-btn"
            onclick="
              document.getElementById('modalAddTask').style.display = 'none'
            "
          >
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </header>
        <form method="post" th:action="@{/board}" class="body">
          <input type="hidden" name="action" value="createTask" />
          <input type="hidden" name="boardId" th:value="${board.id}" />

          <div class="field">
            <label>Titre</label>
            <input
              type="text"
              name="title"
              placeholder="Nom de la tâche"
              required
            />
          </div>
          <div class="field">
            <label>Description</label>
            <textarea
              name="description"
              rows="3"
              placeholder="Description optionnelle…"
            ></textarea>
          </div>
          <div class="field">
            <label>Type</label>
            <select name="typeId" required>
              <option value="standard">Standard</option>
              <option value="bug">Bug</option>
              <option value="spike">Spike</option>
              <option value="amelioration">Amélioration</option>
            </select>
          </div>
          <div class="field">
            <label>Assigner à</label>
            <select name="assigneeId">
              <option value="">— Personne —</option>
              <option
                th:each="m : ${members}"
                th:value="${m.id}"
                th:text="${m.pseudo}"
              >
                membre
              </option>
            </select>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-ghost"
              onclick="
                document.getElementById('modalAddTask').style.display = 'none'
              "
            >
              Annuler
            </button>
            <button type="submit" class="btn btn-primary">Créer</button>
          </div>
        </form>
      </div>
    </div>

    <!-- =====================================================
     MODAL : Inviter un membre
===================================================== -->
    <div class="modal-backdrop" id="modalInvite" style="display: none">
      <div class="modal">
        <header>
          <h3>Inviter un membre</h3>
          <button
            class="icon-btn"
            onclick="
              document.getElementById('modalInvite').style.display = 'none'
            "
          >
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </header>
        <form method="post" th:action="@{/board}" class="body">
          <input type="hidden" name="action" value="invite" />
          <input type="hidden" name="boardId" th:value="${board.id}" />
          <div class="field">
            <label>Pseudo de l'utilisateur</label>
            <input type="text" name="pseudo" placeholder="audrey" required />
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-ghost"
              onclick="
                document.getElementById('modalInvite').style.display = 'none'
              "
            >
              Annuler
            </button>
            <button type="submit" class="btn btn-primary">Inviter</button>
          </div>
        </form>
      </div>
    </div>

    <!-- =====================================================
     MODAL : Détail d'une tâche
===================================================== -->
    <div class="modal-backdrop" id="modalTask" style="display: none">
      <div class="modal modal-wide">
        <header>
          <h3 id="taskDetailTitle">Tâche</h3>
          <button
            class="icon-btn"
            onclick="
              document.getElementById('modalTask').style.display = 'none'
            "
          >
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </header>
        <div class="body task-detail-body">
          <div class="task-detail-left">
            <p class="task-detail-desc" id="taskDetailDesc">—</p>

            <!-- Commentaires -->
            <h4 style="margin: 16px 0 8px">Commentaires</h4>
            <div id="taskDetailComments" class="comments-list"></div>
            <form method="post" th:action="@{/board}" id="formComment">
              <input type="hidden" name="action" value="addComment" />
              <input type="hidden" name="boardId" th:value="${board.id}" />
              <input type="hidden" name="taskId" id="commentTaskId" />
              <div class="field" style="margin-top: 8px">
                <textarea
                  name="content"
                  rows="2"
                  placeholder="Ajouter un commentaire…"
                ></textarea>
              </div>
              <button type="submit" class="btn btn-primary btn-sm">
                Commenter
              </button>
            </form>

            <!-- Pièces jointes -->
            <h4 style="margin: 16px 0 8px">Pièces jointes</h4>
            <div id="taskDetailAttachments" class="attachments-list"></div>
            <form
              method="post"
              th:action="@{/board}"
              enctype="multipart/form-data"
              id="formAttachment"
            >
              <input type="hidden" name="action" value="addAttachment" />
              <input type="hidden" name="boardId" th:value="${board.id}" />
              <input type="hidden" name="taskId" id="attachTaskId" />
              <div class="field" style="margin-top: 8px">
                <input type="file" name="file" />
              </div>
              <button type="submit" class="btn btn-primary btn-sm">
                Joindre
              </button>
            </form>
          </div>

          <div class="task-detail-right">
            <!-- Historique -->
            <h4>Historique</h4>
            <ul id="taskDetailHistory" class="history-list"></ul>

            <!-- Supprimer -->
            <form
              method="post"
              th:action="@{/board}"
              id="formDelete"
              style="margin-top: 16px"
            >
              <input type="hidden" name="action" value="deleteTask" />
              <input type="hidden" name="boardId" th:value="${board.id}" />
              <input type="hidden" name="taskId" id="deleteTaskId" />
              <button
                type="submit"
                class="btn btn-danger btn-sm"
                onclick="return confirm('Supprimer cette tâche ?');"
              >
                Supprimer
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Données injectées par Thymeleaf pour le JS -->
    <script th:inline="javascript">
      /*<![CDATA[*/
      const BOARD_ID = /*[[${board.id}]]*/ "";
      const CONTEXT = /*[[${contextPath}]]*/ "";

      // On injecte les tâches complètes (avec commentaires, historique, pièces jointes)
      // sous forme de tableau JS pour éviter des appels AJAX
      const ALL_TASKS = /*[[${tasks}]]*/ [];
      /*]]>*/
    </script>

    <script>
      // ---- Drag & Drop ----
      let draggedId = null;
      let draggedBoard = null;

      function onDragStart(e) {
        draggedId = e.currentTarget.dataset.id;
        draggedBoard = e.currentTarget.dataset.board;
        e.dataTransfer.effectAllowed = "move";
      }

      function onDrop(e, colId) {
        e.preventDefault();
        if (!draggedId) return;

        // POST vers /board action=moveTask
        const form = document.createElement("form");
        form.method = "post";
        form.action = CONTEXT + "/board";
        [
          ["action", "moveTask"],
          ["boardId", draggedBoard],
          ["taskId", draggedId],
          ["columnId", colId],
        ].forEach(([k, v]) => {
          const i = document.createElement("input");
          i.type = "hidden";
          i.name = k;
          i.value = v;
          form.appendChild(i);
        });
        document.body.appendChild(form);
        form.submit();
      }

      // ---- Modale détail tâche ----
      function openTask(taskId) {
        const task = ALL_TASKS.find((t) => t.id === taskId);
        if (!task) return;

        document.getElementById("taskDetailTitle").textContent = task.title;
        document.getElementById("taskDetailDesc").textContent =
          task.description || "—";
        document.getElementById("commentTaskId").value = taskId;
        document.getElementById("attachTaskId").value = taskId;
        document.getElementById("deleteTaskId").value = taskId;

        // Commentaires
        const commentsEl = document.getElementById("taskDetailComments");
        commentsEl.innerHTML = "";
        (task.comments || []).forEach((c) => {
          const div = document.createElement("div");
          div.className = "comment-item";
          div.textContent = c.content;
          commentsEl.appendChild(div);
        });

        // Pièces jointes
        const attachEl = document.getElementById("taskDetailAttachments");
        attachEl.innerHTML = "";
        (task.attachments || []).forEach((a) => {
          const div = document.createElement("div");
          div.className = "attachment-item";
          div.textContent = a.filename;
          attachEl.appendChild(div);
        });

        // Historique
        const histEl = document.getElementById("taskDetailHistory");
        histEl.innerHTML = "";
        (task.history || []).forEach((h) => {
          const li = document.createElement("li");
          li.textContent = h.text;
          histEl.appendChild(li);
        });

        document.getElementById("modalTask").style.display = "flex";
      }

      // ---- Boutons d'ouverture des modales ----
      document.getElementById("btnAddTask").onclick = () => {
        document.getElementById("modalAddTask").style.display = "flex";
      };
      document.getElementById("btnInvite").onclick = () => {
        document.getElementById("modalInvite").style.display = "flex";
      };

      // Fermer en cliquant hors de la modale
      document.querySelectorAll(".modal-backdrop").forEach((backdrop) => {
        backdrop.onclick = (e) => {
          if (e.target === backdrop) backdrop.style.display = "none";
        };
      });

      // Ouvrir la modale tâche si paramètre ?task=xxx dans l'URL (après addComment/addAttachment)
      const params = new URLSearchParams(window.location.search);
      if (params.get("task")) openTask(params.get("task"));
    </script>
  </body>
</html>
