<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OKINA – Mes tableaux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>
  <body>
    <div class="app-shell">
      <!-- Header -->
      <header class="app-header">
        <div class="brand">
          <div class="mark">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
          </div>
          <span>OKINA Kanban</span>
        </div>
        <div class="spacer"></div>

        <!-- Avatar + pseudo -->
        <button class="user-chip">
          <div
            class="avatar"
            style="background: var(--accent)"
            th:text="${#strings.substring(user.pseudo, 0, 1).toUpperCase()}"
          >
            A
          </div>
          <span th:text="${user.pseudo}">pseudo</span>
        </button>

        <!-- Déconnexion -->
        <a
          th:href="@{/logout}"
          class="btn btn-ghost btn-sm text-decoration-none"
          >Se déconnecter</a
        >
      </header>

      <!-- Contenu -->
      <main class="boards-page">
        <header>
          <div>
            <h1>Mes tableaux</h1>
            <p class="lead">
              Retrouvez tous les projets auxquels vous contribuez.
            </p>
          </div>
        </header>

        <!-- Message succès -->
        <div
          th:if="${success}"
          style="
            margin-bottom: 16px;
            color: var(--type-amelioration);
            font-size: 14px;
          "
          th:text="${success}"
        ></div>
        <div
          th:if="${erreur}"
          style="margin-bottom: 16px; color: var(--danger); font-size: 14px"
          th:text="${erreur}"
        ></div>

        <!-- Grille des tableaux -->
        <div class="boards-grid">
          <div
            class="board-card"
            th:each="board : ${boards}"
            th:data-id="${board.id}"
            onclick="window.location.href = 'board?id=' + this.dataset.id"
          >
            <div class="stripe"></div>
            <h3 th:text="${board.name}">Mon tableau</h3>
            <div class="meta">
              <div class="members">
                <div
                  th:each="member : ${board.members}"
                  class="avatar sm"
                  style="background: var(--accent)"
                  th:text="${#strings.substring(member.pseudo, 0, 1).toUpperCase()}"
                  th:title="${member.pseudo}"
                >
                  A
                </div>
              </div>
              <span th:text="${#lists.size(board.members)} + ' membre(s)'"
                >1 membre(s)</span
              >
            </div>
          </div>

          <!-- Carte "Ajouter" -->
          <div class="board-card add-card" id="btnNewBoard">
            <span>+ Nouveau tableau</span>
          </div>
        </div>
      </main>
    </div>

    <!-- =====================================================
     MODAL : Stripe sandbox + nom du tableau
     ===================================================== -->
    <div class="modal-backdrop" id="modalBackdrop" style="display: none">
      <div class="stripe-modal" style="min-width: 15%">
        <header>
          <h3>Créer un tableau</h3>
          <button class="icon-btn" id="btnCloseModal">
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </header>

        <!-- Étape 1 : nom du tableau -->
        <div class="body" id="stepName">
          <div class="field">
            <label>Nom du tableau</label>
            <input
              type="text"
              id="boardName"
              placeholder="Ex : Sprint Q3, Backlog produit…"
            />
            <span class="err" id="errBoardName"></span>
          </div>
          <div
            style="
              display: flex;
              justify-content: flex-end;
              gap: 8px;
              margin-top: 8px;
            "
          >
            <button class="btn btn-ghost" id="btnCancelStep1">Annuler</button>
            <button class="btn btn-primary" id="btnGoToPayment">
              Suivant →
            </button>
          </div>
        </div>

        <!-- Étape 2 : paiement Stripe sandbox -->
        <div class="body" id="stepPayment" style="display: none">
          <div class="price-row">
            <span>Création d'un tableau</span>
            <span class="amount">9,99 €</span>
          </div>
          <span class="sandbox-tag">
            <svg
              viewBox="0 0 24 24"
              width="12"
              height="12"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            Mode bac à sable – aucun vrai paiement
          </span>

          <div style="margin-top: 18px">
            <div class="field">
              <label>Numéro de carte</label>
              <input
                type="text"
                value="4242 4242 4242 4242"
                readonly
                style="
                  font-family: var(--font-mono);
                  background: var(--bg-soft);
                "
              />
            </div>
            <div style="display: flex; gap: 12px">
              <div class="field" style="flex: 1">
                <label>Expiration</label>
                <input
                  type="text"
                  value="12/30"
                  readonly
                  style="
                    font-family: var(--font-mono);
                    background: var(--bg-soft);
                  "
                />
              </div>
              <div class="field" style="flex: 1">
                <label>CVC</label>
                <input
                  type="text"
                  value="123"
                  readonly
                  style="
                    font-family: var(--font-mono);
                    background: var(--bg-soft);
                  "
                />
              </div>
            </div>
          </div>
        </div>

        <div class="footer" id="footerPayment" style="display: none">
          <button class="btn btn-ghost" id="btnBackToName">← Retour</button>

          <!-- Formulaire qui POST vers /checkout (démarre la session Stripe) -->
          <form
            method="post"
            th:action="@{/checkout}"
            id="formCreateBoard"
            style="display: inline"
          >
            <input type="hidden" name="name" id="hiddenBoardName" />
            <button type="submit" class="btn btn-primary">
              Payer et créer
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      const backdrop = document.getElementById("modalBackdrop");
      const stepName = document.getElementById("stepName");
      const stepPay = document.getElementById("stepPayment");
      const footerPay = document.getElementById("footerPayment");
      const boardName = document.getElementById("boardName");
      const errName = document.getElementById("errBoardName");
      const hiddenName = document.getElementById("hiddenBoardName");

      function openModal() {
        backdrop.style.display = "flex";
        boardName.focus();
      }
      function closeModal() {
        backdrop.style.display = "none";
        boardName.value = "";
        errName.textContent = "";
        showStep(1);
      }
      function showStep(n) {
        stepName.style.display = n === 1 ? "block" : "none";
        stepPay.style.display = n === 2 ? "block" : "none";
        footerPay.style.display = n === 2 ? "flex" : "none";
      }

      document.getElementById("btnNewBoard").onclick = openModal;
      document.getElementById("btnCloseModal").onclick = closeModal;
      document.getElementById("btnCancelStep1").onclick = closeModal;
      document.getElementById("btnBackToName").onclick = function () {
        showStep(1);
      };

      document.getElementById("btnGoToPayment").onclick = function () {
        if (!boardName.value.trim()) {
          errName.textContent = "Le nom est obligatoire.";
          return;
        }
        hiddenName.value = boardName.value.trim();
        errName.textContent = "";
        showStep(2);
      };

      // Fermer en cliquant hors de la modale
      backdrop.onclick = function (e) {
        if (e.target === backdrop) closeModal();
      };

      // Ré-ouvrir la modale si erreur serveur
      const showModal = /*[[${showModal}]]*/ false;
      if (showModal) openModal();
    </script>
  </body>
</html>
