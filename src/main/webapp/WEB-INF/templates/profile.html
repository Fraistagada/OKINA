<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OKINA – Mon profil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <script>
      // Applique le thème sauvegardé avant le rendu (évite le flash)
      (function () {
        const saved = localStorage.getItem("okina-theme");
        if (
          saved === "dark" ||
          (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div class="app-shell">
      <!-- Sidebar partagée -->
      <div th:replace="~{fragments/sidebar :: sidebar(null, 'profile')}"></div>

      <div class="app-main">
        <!-- Header -->
        <header class="app-header">
          <button class="icon-btn btn-burger" id="btnBurger" aria-label="Menu">
            <svg
              viewBox="0 0 24 24"
              width="19"
              height="19"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <div class="spacer"></div>

          <!-- Notifications -->
          <button class="icon-btn" id="btnNotif" title="Notifications">
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span
              class="dot"
              th:if="${unreadCount != null and unreadCount > 0}"
            ></span>
          </button>
        </header>

        <!-- Panneau de notifications -->
        <div class="notif-panel" id="notifPanel" style="display: none">
          <header><span>Notifications</span></header>
          <div class="notif-list">
            <div
              class="notif-item"
              th:each="n : ${notifications}"
              th:classappend="${!n.read} ? ' unread'"
              th:data-board="${n.boardId}"
              th:data-task="${n.taskId}"
            >
              <span class="dot" th:if="${!n.read}"></span>
              <div class="body">
                <div class="text" th:text="${n.text}">…</div>
                <div class="when" th:text="${n.when}">…</div>
              </div>
            </div>
            <div
              class="notif-empty"
              th:if="${notifications == null or #lists.isEmpty(notifications)}"
            >
              Aucune notification pour l'instant.
            </div>
          </div>
        </div>

        <!-- Contenu -->
        <main class="profile-page">
          <header>
            <div
              class="avatar lg"
              th:style="'background:' + ${user.color}"
              th:text="${#strings.substring(user.pseudo, 0, 1).toUpperCase()}"
            >
              A
            </div>
            <div>
              <h1 th:text="${user.pseudo}">pseudo</h1>
              <p class="lead" th:text="${user.email}">email</p>
            </div>
          </header>

          <!-- Messages -->
          <div
            th:if="${success}"
            class="banner success"
            th:text="${success}"
          ></div>
          <div th:if="${erreur}" class="banner error" th:text="${erreur}"></div>

          <!-- Informations -->
          <section class="profile-card">
            <h3>Informations</h3>
            <form method="post" th:action="@{/profile}">
              <input type="hidden" name="action" value="updateProfile" />
              <div class="form-row">
                <div class="field">
                  <label for="pseudo">Pseudo</label>
                  <input
                    type="text"
                    id="pseudo"
                    name="pseudo"
                    th:value="${user.pseudo}"
                    required
                  />
                </div>
                <div class="field">
                  <label for="email">Email</label>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    th:value="${user.email}"
                    required
                  />
                </div>
              </div>
              <div class="actions">
                <button type="submit" class="btn btn-primary">
                  Enregistrer
                </button>
              </div>
            </form>
          </section>

          <!-- Couleur d'avatar -->
          <section class="profile-card">
            <h3>Couleur d'avatar</h3>
            <p class="hint-text">
              Utilisée partout où votre avatar apparaît (tableaux, mentions,
              tâches assignées).
            </p>
            <form method="post" th:action="@{/profile}" id="formColor">
              <input type="hidden" name="action" value="updateColor" />
              <div class="color-swatches">
                <label class="swatch-opt" th:each="c : ${avatarColors}">
                  <input
                    type="radio"
                    name="color"
                    th:value="${c}"
                    th:checked="${c == user.avatarColor}"
                  />
                  <span
                    class="swatch-circle"
                    th:style="'background:' + ${c}"
                    th:text="${#strings.substring(user.pseudo, 0, 1).toUpperCase()}"
                    >A</span
                  >
                </label>
              </div>
            </form>
          </section>

          <!-- Mot de passe -->
          <section class="profile-card">
            <h3>Mot de passe</h3>
            <form method="post" th:action="@{/profile}">
              <input type="hidden" name="action" value="updatePassword" />
              <div class="field">
                <label for="currentPassword">Mot de passe actuel</label>
                <input
                  type="password"
                  id="currentPassword"
                  name="currentPassword"
                  autocomplete="current-password"
                  required
                />
              </div>
              <div class="form-row">
                <div class="field">
                  <label for="newPassword">Nouveau mot de passe</label>
                  <input
                    type="password"
                    id="newPassword"
                    name="newPassword"
                    autocomplete="new-password"
                    required
                  />
                  <span class="hint">Minimum 8 caractères.</span>
                </div>
                <div class="field">
                  <label for="confirmPassword">Confirmation</label>
                  <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    autocomplete="new-password"
                    required
                  />
                </div>
              </div>
              <div class="actions">
                <button type="submit" class="btn btn-primary">
                  Changer le mot de passe
                </button>
              </div>
            </form>
          </section>
        </main>
      </div>
    </div>

    <script>
      // Couleur d'avatar : envoi dès la sélection
      document
        .querySelectorAll('#formColor input[type="radio"]')
        .forEach((radio) => {
          radio.addEventListener("change", () => {
            document.getElementById("formColor").submit();
          });
        });

      // ---- Panneau de notifications ----
      const btnNotif = document.getElementById("btnNotif");
      const notifPanel = document.getElementById("notifPanel");
      if (btnNotif && notifPanel) {
        btnNotif.onclick = (e) => {
          e.stopPropagation();
          const isOpen = notifPanel.style.display !== "none";
          notifPanel.style.display = isOpen ? "none" : "flex";
          if (!isOpen) {
            fetch("notifications/read", { method: "post" });
            const dot = btnNotif.querySelector(".dot");
            if (dot) dot.remove();
          }
        };
        document.addEventListener("click", (e) => {
          if (!notifPanel.contains(e.target) && !btnNotif.contains(e.target)) {
            notifPanel.style.display = "none";
          }
        });
        notifPanel.querySelectorAll(".notif-item").forEach((item) => {
          item.onclick = () => {
            const b = item.dataset.board;
            if (!b) return;
            const t = item.dataset.task;
            window.location.href = "board?id=" + b + (t ? "&task=" + t : "");
          };
        });
      }

      // ---- Sidebar mobile (burger) ----
      const btnBurger = document.getElementById("btnBurger");
      const sidebarEl = document.getElementById("sidebar");
      const sbBackdrop = document.getElementById("sbBackdrop");
      if (btnBurger && sidebarEl && sbBackdrop) {
        btnBurger.onclick = () => {
          sidebarEl.classList.add("open");
          sbBackdrop.classList.add("show");
        };
        sbBackdrop.onclick = () => {
          sidebarEl.classList.remove("open");
          sbBackdrop.classList.remove("show");
        };
      }

      // ---- Thème ----
      document.getElementById("themeToggle").onclick = function () {
        const root = document.documentElement;
        if (root.getAttribute("data-theme") === "dark") {
          root.removeAttribute("data-theme");
          localStorage.setItem("okina-theme", "light");
        } else {
          root.setAttribute("data-theme", "dark");
          localStorage.setItem("okina-theme", "dark");
        }
      };
    </script>
  </body>
</html>
